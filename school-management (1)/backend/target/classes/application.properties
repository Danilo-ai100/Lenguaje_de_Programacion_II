# ===================================================================
# CONFIGURACIÓN DEL SISTEMA ESCOLAR DAYIVA
# ===================================================================

# Información de la aplicación
spring.application.name=Escuela Backend API
server.port=8080

# ===================================================================
# CONFIGURACIÓN DE BASE DE DATOS
# ===================================================================

# H2 Database (Desarrollo)
spring.datasource.url=jdbc:h2:mem:escuela
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# MySQL Database (Producción) - Descomentar para usar MySQL
#spring.datasource.url=jdbc:mysql://localhost:3306/escuela_sistema?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
#spring.datasource.username=escuela_user
#spring.datasource.password=escuela_password_2024
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# CONFIGURACIÓN JPA/HIBERNATE
# ===================================================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ===================================================================
# CONFIGURACIÓN DE SEGURIDAD JWT
# ===================================================================
jwt.secret=EscuelaDayivaSecretKey2024MuySeguraParaJWTTokensDeAutenticacion
jwt.expiration=86400000

# ===================================================================
# CONFIGURACIÓN DE CORS
# ===================================================================
cors.allowed-origins=http://localhost:4200,http://localhost:3000
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*

# ===================================================================
# CONFIGURACIÓN DE LOGGING
# ===================================================================
logging.level.com.escuela.backend=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ===================================================================
# CONFIGURACIÓN DE ARCHIVOS
# ===================================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===================================================================
# CONFIGURACIÓN DE DESARROLLO
# ===================================================================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
